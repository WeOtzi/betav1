<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>We Ötzi · Globo — Artistas y estudios en el mundo</title>
    <meta name="description" content="Explora artistas tatuadores y estudios en un globo 3D: busca por ciudad o estilo y sigue los viajes de tus artistas favoritos.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="We Ötzi · Globo de tatuadores">
    <meta property="og:description" content="Atlas global de artistas y estudios We Ötzi sobre una tierra nocturna 3D.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/shared/css/explore-globe.css">

    <script src="/shared/js/config-manager.js"></script>
    <script src="/shared/js/geocoder.js"></script>
    <script src="/shared/js/support-loader.js" defer></script>

    <!-- Three.js WebGPU vendorizado (sin build step) -->
    <script type="importmap">
    {
        "imports": {
            "three": "/shared/vendor/three/three.webgpu.js",
            "three/webgpu": "/shared/vendor/three/three.webgpu.js",
            "three/tsl": "/shared/vendor/three/three.tsl.js",
            "three/addons/": "/shared/vendor/three/addons/"
        }
    }
    </script>
</head>

<!-- El globo es intencionalmente oscuro: la tierra nocturna ES la página. -->
<body data-theme="dark" class="globe-page">

    <!-- Escenario 3D (canvas a pantalla completa) -->
    <div id="globe-stage" aria-label="Globo terráqueo interactivo"></div>

    <!-- Barra superior mínima -->
    <header class="globe-topbar">
        <a class="globe-back" href="/explore" title="Volver al mapa">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <a class="globe-brand" href="/">WE<span>ÖTZI</span></a>
        <span id="globe-counter" class="globe-counter"></span>
    </header>

    <!-- Buscador (search-first) -->
    <div class="globe-search" role="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="globe-search-input" type="search" autocomplete="off"
               placeholder="Busca artistas, estudios, ciudades o estilos…"
               aria-label="Buscar artistas, estudios, ciudades o estilos">
        <div id="globe-search-results" class="globe-search-results" hidden></div>
    </div>

    <!-- Tarjeta de selección (artista / estudio / ciudad / estilo) -->
    <aside id="globe-card" class="globe-card" hidden>
        <button id="card-close" class="card-close" aria-label="Cerrar">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="card-body"></div>
    </aside>

    <!-- Overlay del tour (avión recorriendo el itinerario) -->
    <div id="globe-tour" class="globe-tour" hidden>
        <div class="tour-head">
            <i class="fa-solid fa-plane"></i>
            <span>Viaje de <strong id="tour-artist"></strong></span>
        </div>
        <div id="tour-stop" class="tour-stop"></div>
        <div class="tour-controls">
            <button id="tour-next" class="btn-ghost"><i class="fa-solid fa-forward"></i> Siguiente</button>
            <button id="tour-exit" class="btn-ghost"><i class="fa-solid fa-xmark"></i> Salir</button>
        </div>
    </div>

    <!-- Tooltip al pasar por un marcador -->
    <div id="globe-tip" class="globe-tip" hidden></div>

    <!-- Estado de carga / errores -->
    <div id="globe-status" class="globe-status">Cargando el mundo…</div>

    <script type="module" src="/shared/js/globe/globe-app.js"></script>
</body>
</html>
