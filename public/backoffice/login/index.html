<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE OTZI | Backoffice Superadmin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/shared/js/config-manager.js"></script>
    <script src="/shared/js/data/postgrest-client.js"></script>
    <script src="/shared/js/data/quotations-repo.js"></script>
    <script src="/shared/js/email-client.js"></script>
    <script src="/shared/js/currency-utils.js"></script>
    <script src="/shared/js/email-routing-admin.js"></script>
    <style>
        :root { --bg: #fffdf5; --fg: #1a1a1a; --red: #e23e28; --yellow: #f4b942; --blue: #1a4b8e; --border: 3px; }
        .dark-mode { --bg: #1a1a1a; --fg: #fffdf5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: grid; grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr); font-family: Inter, sans-serif; background: var(--bg); color: var(--fg); }
        .brand { display: flex; flex-direction: column; justify-content: center; padding: 48px; background: var(--blue); color: white; border-right: var(--border) solid var(--fg); }
        .brand h1 { font-size: clamp(48px, 8vw, 96px); line-height: 0.9; letter-spacing: 0; font-weight: 900; text-transform: uppercase; }
        .brand p { margin-top: 24px; max-width: 460px; font-family: "Space Mono", monospace; font-size: 14px; line-height: 1.6; text-transform: uppercase; }
        .panel { display: flex; align-items: center; justify-content: center; padding: 32px; }
        .login-box { width: 100%; max-width: 420px; }
        .topline { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .mode { font-family: "Space Mono", monospace; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .theme-toggle { width: 40px; height: 40px; border: var(--border) solid var(--fg); background: var(--yellow); color: #1a1a1a; font-weight: 900; cursor: pointer; }
        h2 { font-size: 40px; line-height: 1; margin-bottom: 12px; text-transform: uppercase; }
        .subtitle { margin-bottom: 28px; font-family: "Space Mono", monospace; font-size: 13px; opacity: 0.72; }
        .fixed-email { margin-bottom: 18px; padding: 14px; border: var(--border) solid var(--fg); background: rgba(26, 75, 142, 0.08); font-family: "Space Mono", monospace; font-size: 13px; overflow-wrap: anywhere; }
        label { display: block; margin-bottom: 8px; font-family: "Space Mono", monospace; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        input { width: 100%; padding: 16px; border: var(--border) solid var(--fg); background: var(--bg); color: var(--fg); font-size: 16px; }
        input:focus { outline: none; border-color: var(--blue); box-shadow: 4px 4px 0 var(--blue); }
        .btn-login { width: 100%; margin-top: 22px; padding: 18px; border: var(--border) solid var(--fg); background: var(--red); color: white; font-weight: 900; font-size: 15px; text-transform: uppercase; cursor: pointer; }
        .btn-login:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--fg); }
        .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; box-shadow: none; }
        .spinner { display: none; width: 18px; height: 18px; margin: 0 auto; border: 3px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        .form-message { display: none; margin-top: 16px; padding: 14px; border: var(--border) solid var(--fg); font-family: "Space Mono", monospace; font-size: 13px; text-align: center; }
        .form-message.error { display: block; background: var(--red); color: white; }
        .form-message.success { display: block; background: var(--blue); color: white; }
        .footer-link { display: inline-block; margin-top: 24px; color: var(--blue); font-family: "Space Mono", monospace; font-size: 12px; text-decoration: none; border-bottom: 2px solid currentColor; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 760px) {
            body { grid-template-columns: 1fr; }
            .brand { display: none; }
            .panel { min-height: 100vh; align-items: stretch; padding: 24px; }
            .login-box { display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>
    <aside class="brand">
        <h1>We<br>Otzi</h1>
        <p>Backoffice privado para la cuenta superadmin.</p>
    </aside>

    <main class="panel">
        <div class="login-box">
            <div class="topline">
                <span class="mode">Superadmin Access</span>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar modo">O</button>
            </div>

            <h2>Backoffice</h2>
            <p class="subtitle">Acceso exclusivo para la cuenta propietaria.</p>

            <div class="fixed-email">
                isai@weotzi.com
            </div>

            <form id="login-form" onsubmit="handleBackofficeLogin(event)">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Tu contrasena" required autocomplete="current-password">
                <button type="submit" class="btn-login" id="btn-login">
                    <span class="btn-text">Entrar al Backoffice</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div id="form-message" class="form-message"></div>
            <a class="footer-link" href="/support/login">Ir al portal de soporte</a>
        </div>
    </main>

    <script src="/shared/js/backoffice-login.js"></script>
</body>
</html>
